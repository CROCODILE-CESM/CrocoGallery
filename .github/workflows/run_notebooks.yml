name: Run CrocoDash Notebooks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
env:
  CIME_MACHINE: ubuntu-latest
  DIN_LOC_ROOT: /workspace
  SCRATCH: /workspace
  CIME_OUTPUT_ROOT: /workspace
  USER: ${{ github.actor }}
jobs:
  resolve-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get latest immutable nightly tag
        id: get-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api /orgs/crocodile-cesm/packages/container/crocodash/versions \
            --jq '[.[] | select(.metadata.container.tags[] | startswith("nightly-"))] | sort_by(.created_at) | last | .metadata.container.tags[] | select(startswith("nightly-"))' \
            | head -1)
          echo "tag=ghcr.io/crocodile-cesm/crocodash:$TAG" >> $GITHUB_OUTPUT

  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read-config.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Build notebook matrix from config
        id: read-config
        run: |
          MATRIX=$(python3 -c "
          import yaml, json
          with open('.github/notebooks.yml') as f:
              config = yaml.safe_load(f)
          print(json.dumps({'notebook': config['run']}))
          ")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  run_notebooks:
    needs: [resolve-image, setup]
    runs-on: gha-runner-crocogallery
    container:
      image: ${{ needs.resolve-image.outputs.tag }}
      options: --pull always
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - uses: actions/checkout@v4

      - uses: actions/checkout@v4 # Get the newest code to ensure we have the latest notebooks
        with:
          repository: crocodile-cesm/CrocoDash
          submodules: recursive
          path: CrocoDash

      - name: Copy CrocoDash into container workdir
        run: |
          rm -rf $WORKDIR/CrocoDash
          cp -r $GITHUB_WORKSPACE/CrocoDash $WORKDIR/

      - name: Set CI case paths
        run: |
          sed -i "s|\"fill_in_id\"|\"$WORKDIR/ci_input\"|g" crocogallery/known_paths.json
          sed -i "s|\"fill_in_cd\"|\"$WORKDIR/ci_cases\"|g" crocogallery/known_paths.json
          sed -i "s|\"Checkout\"|\"$CESMROOT\"|g" crocogallery/known_paths.json

      - name: Inject paths into notebooks
        run: |
          conda run -n CrocoDash python -m crocogallery

      - name: Create CI case
        run: |
          conda run -n CrocoDash jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=600 \
            tools/ci_case_setup.ipynb

      - name: Clear notebook outputs
        run: |
          conda run -n CrocoDash \
              jupyter nbconvert --clear-output --inplace \
              ${{ matrix.notebook }}

      - name: Run notebook (attempt 1)
        id: run_nb_1
        continue-on-error: true
        # BGC isn't run as it uses data on GDEX that isn't accessible on the GHCR runner.
        # Consider adding a test BGC dataset to inputdata in the future.
        run: |
          conda run -n CrocoDash \
              jupyter nbconvert --to notebook --execute --inplace \
              --ExecutePreprocessor.timeout=600 \
              --TagRemovePreprocessor.enabled=True \
              --TagRemovePreprocessor.remove_cell_tags='["ci-skip"]' \
              ${{ matrix.notebook }}

      - name: Clear notebook outputs before retry
        if: steps.run_nb_1.outcome == 'failure'
        run: |
          conda run -n CrocoDash \
              jupyter nbconvert --clear-output --inplace \
              ${{ matrix.notebook }}

      - name: Run notebook (attempt 2 / retry)
        id: run_nb_2
        if: steps.run_nb_1.outcome == 'failure'
        run: |
          conda run -n CrocoDash \
              jupyter nbconvert --to notebook --execute --inplace \
              --ExecutePreprocessor.timeout=600 \
              --TagRemovePreprocessor.enabled=True \
              --TagRemovePreprocessor.remove_cell_tags='["ci-skip"]' \
              ${{ matrix.notebook }}

