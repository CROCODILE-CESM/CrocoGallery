name: Run CrocoDash Notebooks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
env:
  CIME_MACHINE: ubuntu-latest
  DIN_LOC_ROOT: /workspace
  SCRATCH: /workspace
  CIME_OUTPUT_ROOT: /workspace
  USER: ${{ github.actor }}
jobs:
  resolve-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get latest immutable nightly tag
        id: get-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api /orgs/crocodile-cesm/packages/container/crocodash/versions \
            --jq '[.[] | select(.metadata.container.tags[] | startswith("nightly-"))] | sort_by(.created_at) | last | .metadata.container.tags[] | select(startswith("nightly-"))' \
            | head -1)
          echo "tag=ghcr.io/crocodile-cesm/crocodash:$TAG" >> $GITHUB_OUTPUT

  run_notebooks:
    needs: resolve-image
    runs-on: gha-runner-crocogallery
    container:
      image: ${{ needs.resolve-image.outputs.tag }}
      options: --pull always
    strategy:
      fail-fast: false
      matrix:
        notebook:
          - gallery/notebooks/CrocoDash/projects/CrocoDash.ipynb
          - gallery/notebooks/CrocoDash/projects/sample_crocodash_projects/CICE_antarctica.ipynb
          - gallery/notebooks/CrocoDash/projects/sample_crocodash_projects/CICE_arctic.ipynb
          - gallery/notebooks/CrocoDash/projects/sample_crocodash_projects/DROF.ipynb
          - gallery/notebooks/CrocoDash/projects/sample_crocodash_projects/NWA.ipynb
          - gallery/notebooks/CrocoDash/tutorials/crocodash_tutorial.ipynb
          - gallery/notebooks/CrocoDash/features/grids/add_grids.ipynb
          - gallery/notebooks/CrocoDash/features/coupling/add_cice.ipynb
          - gallery/notebooks/CrocoDash/features/data_handling/add_data_products.ipynb
          - gallery/notebooks/CrocoDash/features/data_handling/too_much_data.ipynb
          - gallery/notebooks/CrocoDash/features/add_chl.ipynb
          - gallery/notebooks/CrocoDash/features/add_rof.ipynb
          - gallery/notebooks/CrocoDash/features/add_runoff_product.ipynb
          - gallery/notebooks/CrocoDash/features/add_tides.ipynb
          - gallery/notebooks/CrocoDash/use_cases/three_boundary_from_t232.ipynb
    steps:
      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - uses: actions/checkout@v4

      - uses: actions/checkout@v4 # Get the newest code to ensure we have the latest notebooks
        with:
          repository: crocodile-cesm/CrocoDash
          submodules: recursive
          path: CrocoDash

      - name: Copy CrocoDash into container workdir
        run: |
          rm -rf $WORKDIR/CrocoDash
          cp -r $GITHUB_WORKSPACE/CrocoDash $WORKDIR/

      - name: Set CI case paths
        run: |
          sed -i "s|\"fill_in_id\"|\"$WORKDIR/ci_input\"|g" crocogallery/known_paths.json
          sed -i "s|\"fill_in_cd\"|\"$WORKDIR/ci_cases\"|g" crocogallery/known_paths.json
          sed -i "s|\"Checkout\"|\"$CESMROOT\"|g" crocogallery/known_paths.json

      - name: Inject paths into notebooks
        run: |
          conda run -n CrocoDash python -m crocogallery

      - name: Create CI case
        run: |
          conda run -n CrocoDash jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=600 \
            tools/ci_case_setup.ipynb

      - name: Clear notebook outputs
        run: |
          conda run -n CrocoDash \
              jupyter nbconvert --clear-output --inplace \
              ${{ matrix.notebook }}

      - name: Run notebook (attempt 1)
        id: run_nb_1
        continue-on-error: true
        # BGC isn't run as it uses data on GDEX that isn't accessible on the GHCR runner.
        # Consider adding a test BGC dataset to inputdata in the future.
        run: |
          conda run -n CrocoDash \
              jupyter nbconvert --to notebook --execute --inplace \
              --ExecutePreprocessor.timeout=600 \
              --TagRemovePreprocessor.enabled=True \
              --TagRemovePreprocessor.remove_cell_tags='["ci-skip"]' \
              ${{ matrix.notebook }}

      - name: Clear notebook outputs before retry
        if: steps.run_nb_1.outcome == 'failure'
        run: |
          conda run -n CrocoDash \
              jupyter nbconvert --clear-output --inplace \
              ${{ matrix.notebook }}

      - name: Run notebook (attempt 2 / retry)
        id: run_nb_2
        if: steps.run_nb_1.outcome == 'failure'
        run: |
          conda run -n CrocoDash \
              jupyter nbconvert --to notebook --execute --inplace \
              --ExecutePreprocessor.timeout=600 \
              --TagRemovePreprocessor.enabled=True \
              --TagRemovePreprocessor.remove_cell_tags='["ci-skip"]' \
              ${{ matrix.notebook }}

      - name: Record badge status
        if: always()
        id: badge_prep
        env:
          NOTEBOOK: ${{ matrix.notebook }}
          ATTEMPT1: ${{ steps.run_nb_1.outcome }}
          ATTEMPT2: ${{ steps.run_nb_2.outcome }}
        run: |
          # Strip gallery/notebooks/ prefix and .ipynb suffix, replace / with _
          NB_KEY=$(echo "$NOTEBOOK" | sed 's|gallery/notebooks/||' | sed 's|\.ipynb$||' | tr '/' '_')
          SAFE_NAME=$(echo "$NOTEBOOK" | tr '/.' '-')
          if [ "$ATTEMPT1" = "success" ] || [ "$ATTEMPT2" = "success" ]; then
            STATUS="passing"
            COLOR="brightgreen"
          else
            STATUS="failing"
            COLOR="critical"
          fi
          mkdir -p /tmp/badge-status
          cat > "/tmp/badge-status/${NB_KEY}.json" << JSON
          {
            "schemaVersion": 1,
            "label": "notebook",
            "message": "${STATUS}",
            "color": "${COLOR}"
          }
          JSON
          echo "artifact_name=badge-status-${SAFE_NAME}" >> $GITHUB_OUTPUT

      - name: Upload badge status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.badge_prep.outputs.artifact_name }}
          path: /tmp/badge-status/
          retention-days: 7

  collect-badges:
    needs: run_notebooks
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup badges branch
        run: |
          if git ls-remote --exit-code --heads origin badges; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . 2>/dev/null || true
            git commit --allow-empty -m "Initialize badges branch [skip ci]"
          fi

      - name: Download all badge status artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: badge-status-*
          path: ./
          merge-multiple: true

      - name: Commit and push badge updates
        run: |
          git add *.json
          git diff --cached --quiet || git commit -m "Update notebook badges [skip ci]"
          git push origin badges
